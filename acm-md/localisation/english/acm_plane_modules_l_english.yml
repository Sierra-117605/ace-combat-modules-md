l_english:
 acm_pulse_laser_1: "Pulse Laser (PLSL)"
 acm_pulse_laser_1_desc: "High-spec anti-air/anti-surface laser firing short bursts. Replaces the standard machine gun. Range approx. 5,000m, with reduced effectiveness in poor visibility and cloud cover. Standard on the ADF-11F Raven and DarkStar in AC7."